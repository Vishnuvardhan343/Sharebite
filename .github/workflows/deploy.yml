name: Node.js Build and Deploy

on:
  push:
    branches: ["main"] # Runs every time you push to main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your preferred Node version
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # Faster, cleaner install than 'npm install'

      - name: Build project
        run: npm run build # Creates your 'dist' or 'build' folder

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # IMPORTANT: Use 'dist' for Vite/Vue or 'build' for React
          path: './dist' 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
